<body>

    <div style="display: flex; gap: var(--spacing-xl); align-items: center;">
      <a href="/" class="menu-logo">CCM</a>
    </div>
    <a href="/learning-in-public/" class="menu-item">← Back</a>
  </nav>

  <main class="blog-post">
    <article>
      <header class="post-header">
        <h1>{{ title }}</h1>
        <div class="post-meta">
          <time datetime="{{ date | dateFilter }}">{{ date | dateDisplay }}</time>
        </div>
      </header>

      <div class="post-content">
        {{ content | safe }}
      </div>
    </article>
  </main>

  <script>
    // Add line numbers to code blocks
    document.querySelectorAll('.post-content pre').forEach(pre => {
      const code = pre.textContent;
      const lines = code.split('\n').length - 1;

      const lineNumbers = document.createElement('span');
      lineNumbers.className = 'code-line-numbers';

      let numbers = '';
      for (let i = 1; i <= lines; i++) {
        numbers += i + '\n';
      }
      lineNumbers.textContent = numbers;

      pre.insertBefore(lineNumbers, pre.firstChild);
      pre.classList.add('with-line-numbers');
    });
  </script>
</body>
